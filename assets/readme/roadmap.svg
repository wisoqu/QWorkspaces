<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111C"/>
      <stop offset="1" stop-color="#0F2438"/>
    </linearGradient>
    <linearGradient id="line" x1="170" y1="360" x2="1030" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58D7FF"/>
      <stop offset="0.5" stop-color="#4EF0C1"/>
      <stop offset="1" stop-color="#FFC46B"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F2741"/>
      <stop offset="1" stop-color="#0A1625"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#123046"/>
      <stop offset="1" stop-color="#0B1727"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#173445"/>
      <stop offset="1" stop-color="#0E1725"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <text x="70" y="94" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Product Roadmap</text>
  <text x="70" y="132" fill="#AAC5D8" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">From local MVP to an AI-native personal workspace platform</text>

  <line x1="170" y1="380" x2="1030" y2="380" stroke="url(#line)" stroke-width="6" stroke-linecap="round"/>

  <circle cx="220" cy="380" r="26" fill="#59D6FF"/>
  <circle cx="600" cy="380" r="26" fill="#49E9C1"/>
  <circle cx="980" cy="380" r="26" fill="#FFBD67"/>

  <rect x="88" y="184" width="268" height="146" rx="24" fill="url(#card1)" stroke="#2B5A7C"/>
  <text x="116" y="226" fill="#61D7FF" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">PHASE 01</text>
  <text x="116" y="264" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Local MVP</text>
  <text x="116" y="302" fill="#BCD3E2" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Workspace shell, notes, tasks,</text>
  <text x="116" y="328" fill="#BCD3E2" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">reminders, initial UX logic</text>

  <rect x="466" y="184" width="268" height="146" rx="24" fill="url(#card2)" stroke="#2D6B78"/>
  <text x="494" y="226" fill="#54F0C7" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">PHASE 02</text>
  <text x="494" y="264" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Intelligent Core</text>
  <text x="494" y="302" fill="#C7DCE6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">AI assistant, memory, planning,</text>
  <text x="494" y="328" fill="#C7DCE6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">context-aware guidance</text>

  <rect x="844" y="184" width="268" height="146" rx="24" fill="url(#card3)" stroke="#7A6544"/>
  <text x="872" y="226" fill="#FFC46B" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">PHASE 03</text>
  <text x="872" y="264" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Superapp Layer</text>
  <text x="872" y="302" fill="#DFD4C4" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Integrations, business model,</text>
  <text x="872" y="328" fill="#DFD4C4" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">platform-scale productization</text>

  <rect x="96" y="450" width="248" height="192" rx="24" fill="#0B1624" stroke="#294D6E"/>
  <text x="122" y="492" fill="#F3FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Core for launch</text>
  <text x="122" y="532" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• personal workspace</text>
  <text x="122" y="562" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• local notes and tasks</text>
  <text x="122" y="592" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• reminder logic</text>
  <text x="122" y="622" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• usable product skeleton</text>

  <rect x="476" y="450" width="248" height="192" rx="24" fill="#0B1624" stroke="#2D6B78"/>
  <text x="502" y="492" fill="#F3FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Differentiator</text>
  <text x="502" y="532" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• assistant dialogue</text>
  <text x="502" y="562" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• memory validation</text>
  <text x="502" y="592" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• planning recommendations</text>
  <text x="502" y="622" fill="#B7CBDD" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• contextual reminders</text>

  <rect x="856" y="450" width="248" height="192" rx="24" fill="#0B1624" stroke="#7A6544"/>
  <text x="882" y="492" fill="#F3FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Scale direction</text>
  <text x="882" y="532" fill="#D9CCBA" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• Google sync</text>
  <text x="882" y="562" fill="#D9CCBA" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• ecosystem integrations</text>
  <text x="882" y="592" fill="#D9CCBA" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• monetization mechanics</text>
  <text x="882" y="622" fill="#D9CCBA" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">• superapp product strategy</text>
  </svg>
